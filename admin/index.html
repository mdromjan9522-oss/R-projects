<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - R Projects</title>
    <link rel="icon" type="image/png" href="../R.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <div class="bg-blobs">
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>
                <div class="blob blob-3"></div>
            </div>
            <header>
                <img src="../R.png" alt="R Logo" class="header-logo">
                <h1>Admin Login</h1>
            </header>
            <form id="login-form" class="admin-form" style="margin-top: 0;">
                <div class="form-group">
                    <input type="password" id="admin-password" required placeholder=" ">
                    <label for="admin-password">Enter Admin Password</label>
                </div>
                <button type="submit" class="admin-btn">Login</button>
            </form>
            <p id="login-error" style="color: #ef4444; margin-top: 1rem; text-align: center; display: none;">Incorrect password. Please try again.</p>
        </div>
    </div>

    <div id="admin-content" style="display: none;">
        <div class="container" style="padding-top: 4rem;">
            <header style="padding-top: 0; position: relative; text-align: center; margin-bottom: 3rem;">
                <div style="display: inline-block;">
                    <img src="../R.png" alt="R Logo" class="header-logo" style="margin-bottom: 0.5rem;">
                    <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Admin Panel</h1>
                    <p style="color: var(--text-secondary);">Add new projects to your website</p>
                </div>
                <button class="logout-btn" onclick="logout()" style="position: absolute; right: 0; top: 0;">Logout</button>
            </header>

        <form class="admin-form" id="add-project-form">
            <div class="form-group">
                <input type="text" id="title" required placeholder=" ">
                <label for="title">Project Title</label>
            </div>
            <div class="form-group">
                <input type="text" id="category" required placeholder=" ">
                <label for="category">Category</label>
            </div>
            <div class="form-group">
                <input type="url" id="link" required placeholder=" ">
                <label for="link">Project Link</label>
            </div>
            <div class="form-group">
                <input type="url" id="logo" placeholder=" ">
                <label for="logo">Logo URL (Optional)</label>
                <div class="input-logo-preview">
                    <img src="../R.png" alt="Logo Preview" id="add-logo-preview">
                </div>
            </div>
            <div class="form-group">
                <textarea id="description" rows="4" required placeholder=" "></textarea>
                <label for="description">Description</label>
            </div>
            <button type="submit" class="admin-btn">Add Project</button>
        </form>

        <div class="project-list-admin">
            <h2 style="margin-bottom: 1.5rem;">Current Projects</h2>
            <div id="admin-projects-container">
                <!-- Current projects will be listed here with delete buttons -->
            </div>
        </div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h2 class="modal-header">Edit Project</h2>
            <form id="edit-project-form" class="admin-form" style="margin: 0; padding: 0; background: transparent; border: none; backdrop-filter: none; max-width: 100%;">
                <input type="hidden" id="edit-index">
                <div class="form-group">
                    <input type="text" id="edit-title" required placeholder=" ">
                    <label for="edit-title">Project Title</label>
                </div>
                <div class="form-group">
                    <input type="text" id="edit-category" required placeholder=" ">
                    <label for="edit-category">Category</label>
                </div>
                <div class="form-group">
                    <input type="url" id="edit-link" required placeholder=" ">
                    <label for="edit-link">Project Link</label>
                </div>
                <div class="form-group">
                    <input type="url" id="edit-logo" placeholder=" ">
                    <label for="edit-logo">Logo URL (Optional)</label>
                    <div class="input-logo-preview">
                        <img src="../R.png" alt="Logo Preview" id="edit-logo-preview">
                    </div>
                </div>
                <div class="form-group">
                    <textarea id="edit-description" rows="4" required placeholder=" "></textarea>
                    <label for="edit-description">Description</label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="admin-btn" style="background: var(--text-secondary);" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="admin-btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
    </div> <!-- Added missing closing div for admin-content -->

    <footer>
        <div class="container">
            <p>&copy; 2026 R Projects. All rights reserved.</p>
            <p class="contact-email">Connect us: <a href="https://mail.google.com/mail/?view=cm&fs=1&to=mdromjan9522@gmail.com" target="_blank">mdromjan9522@gmail.com</a></p>
            <p class="developer-credit">Developed by <span class="rgb-text">romjan</span></p>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script>
        // Simple password-based authentication
        const ADMIN_PASSWORD = 'kgfstar1'; // Updated password

        document.addEventListener('DOMContentLoaded', () => {
            const loginOverlay = document.getElementById('login-overlay');
            const adminContent = document.getElementById('admin-content');
            const loginForm = document.getElementById('login-form');
            const loginError = document.getElementById('login-error');
            const form = document.getElementById('add-project-form');
            const adminContainer = document.getElementById('admin-projects-container');

            function checkAuth() {
                const isAuth = sessionStorage.getItem('isAdminAuth');
                if (isAuth === 'true') {
                    loginOverlay.style.display = 'none';
                    adminContent.style.display = 'block';
                    renderAdminProjects();
                } else {
                    loginOverlay.style.display = 'flex';
                    adminContent.style.display = 'none';
                }
            }

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('admin-password').value;
                if (password === ADMIN_PASSWORD) {
                    sessionStorage.setItem('isAdminAuth', 'true');
                    loginError.style.display = 'none';
                    checkAuth();
                } else {
                    loginError.style.display = 'block';
                }
            });

            window.logout = () => {
                sessionStorage.removeItem('isAdminAuth');
                checkAuth();
            };

            // Logo URL preview logic for Add form
            const logoInput = document.getElementById('logo');
            const addLogoPreview = document.getElementById('add-logo-preview');
            
            logoInput.addEventListener('input', () => {
                const url = logoInput.value.trim();
                addLogoPreview.src = url || '../R.png';
            });
            
            addLogoPreview.onerror = () => {
                addLogoPreview.src = '../R.png';
            };

            // Logo URL preview logic for Edit form
            const editLogoInput = document.getElementById('edit-logo');
            const editLogoPreview = document.getElementById('edit-logo-preview');
            
            editLogoInput.addEventListener('input', () => {
                const url = editLogoInput.value.trim();
                editLogoPreview.src = url || '../R.png';
            });
            
            editLogoPreview.onerror = () => {
                editLogoPreview.src = '../R.png';
            };

            function renderAdminProjects() {
                const projects = typeof getProjects === 'function' ? getProjects() : (JSON.parse(localStorage.getItem('myProjects')) || []);
                if (!adminContainer) return;
                adminContainer.innerHTML = '';
                
                projects.forEach((project, index) => {
                    let domain = '';
                    let logoUrl = project.logo || '../R.png';
                    
                    if (!project.logo) {
                        try {
                            domain = new URL(project.link).hostname;
                            if (domain.includes('youtube.com')) {
                                logoUrl = 'https://www.youtube.com/favicon.ico';
                            } else {
                                logoUrl = `https://logo.clearbit.com/${domain}`;
                            }
                        } catch (e) {}
                    }

                    const card = document.createElement('div');
                    card.className = 'admin-project-item';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem; width: 100%;">
                            <span class="category-badge">${project.category}</span>
                            <div class="logo-preview-admin">
                                <img src="${logoUrl}" alt="Logo" onerror="this.src='../R.png'">
                            </div>
                        </div>
                        <h2>${project.title}</h2>
                        <p>${project.description}</p>
                        <div class="admin-actions">
                            <button class="edit-btn" onclick="openEditModal(${index})">Edit</button>
                            <button class="delete-btn" onclick="deleteProject(${index})">Delete</button>
                        </div>
                    `;
                    adminContainer.appendChild(card);
                });
            }

            window.deleteProject = (index) => {
                if(confirm('Are you sure you want to delete this project?')) {
                    const projects = typeof getProjects === 'function' ? getProjects() : (JSON.parse(localStorage.getItem('myProjects')) || []);
                    projects.splice(index, 1);
                    localStorage.setItem('myProjects', JSON.stringify(projects));
                    renderAdminProjects();
                }
            };

            const editModal = document.getElementById('edit-modal');
            const editForm = document.getElementById('edit-project-form');

            window.openEditModal = (index) => {
                const projects = typeof getProjects === 'function' ? getProjects() : (JSON.parse(localStorage.getItem('myProjects')) || []);
                const project = projects[index];
                
                document.getElementById('edit-index').value = index;
                document.getElementById('edit-title').value = project.title;
                document.getElementById('edit-category').value = project.category;
                document.getElementById('edit-link').value = project.link;
                document.getElementById('edit-logo').value = project.logo || '';
                document.getElementById('edit-logo-preview').src = project.logo || '../R.png';
                document.getElementById('edit-description').value = project.description;
                
                editModal.classList.add('active');
            };

            window.closeEditModal = () => {
                editModal.classList.remove('active');
            };

            editForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const index = document.getElementById('edit-index').value;
                const projects = typeof getProjects === 'function' ? getProjects() : (JSON.parse(localStorage.getItem('myProjects')) || []);
                
                projects[index] = {
                    title: document.getElementById('edit-title').value,
                    category: document.getElementById('edit-category').value,
                    link: document.getElementById('edit-link').value,
                    logo: document.getElementById('edit-logo').value,
                    description: document.getElementById('edit-description').value
                };
                
                localStorage.setItem('myProjects', JSON.stringify(projects));
                closeEditModal();
                renderAdminProjects();
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const newProject = {
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    link: document.getElementById('link').value,
                    logo: document.getElementById('logo').value,
                    description: document.getElementById('description').value
                };

                const projects = typeof getProjects === 'function' ? getProjects() : (JSON.parse(localStorage.getItem('myProjects')) || []);
                projects.push(newProject);
                localStorage.setItem('myProjects', JSON.stringify(projects));

                form.reset();
                addLogoPreview.src = '../R.png';
                renderAdminProjects();
                alert('Project added successfully!');
            });

            checkAuth();
        });
    </script>
</body>
</html>
